<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - IAAD-PROJECT</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2>📝 Daftar Akun</h2>
      
      <div id="alert" class="hidden"></div>
      
      <form id="registerForm">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="nama" class="form-input" placeholder="Masukkan nama lengkap" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="contoh@email.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Nomor Telepon (Opsional)</label>
          <input type="tel" id="telepon" class="form-input" placeholder="08123456789">
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Minimal 6 karakter" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Konfirmasi Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Ulangi password" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          Daftar
        </button>
      </form>
      
      <div class="auth-link">
        Sudah punya akun? <a href="/public/login.html">Login di sini</a>
      </div>
      
      <div class="auth-link" style="margin-top: 1.5rem;">
        <a href="/public/index.html">← Kembali ke Beranda</a>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading"></div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    const alertDiv = document.getElementById('alert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nama = document.getElementById('nama').value.trim();
      const email = document.getElementById('email').value.trim();
      const telepon = document.getElementById('telepon').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validation
      if (password !== confirmPassword) {
        showAlert('Password dan konfirmasi password tidak sama', 'error');
        return;
      }

      if (password.length < 6) {
        showAlert('Password minimal 6 karakter', 'error');
        return;
      }

      showLoading(true);

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, nama, telepon })
        });

        const data = await response.json();

        if (response.ok) {
          // Save token
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          showAlert('Registrasi berhasil! Mengalihkan...', 'success');
          setTimeout(() => {
            window.location.href = '/public/dashboard.html';
          }, 1500);
        } else {
          showAlert(data.error || 'Registrasi gagal', 'error');
        }
      } catch (error) {
        showAlert('Terjadi kesalahan. Coba lagi nanti.', 'error');
      } finally {
        showLoading(false);
      }
    });

    function showAlert(message, type) {
      alertDiv.className = type === 'success' ? 'alert alert-success' : 'alert alert-error';
      alertDiv.textContent = message;
      alertDiv.classList.remove('hidden');
    }

    function showLoading(show) {
      document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
    }
  </script>
</body>
</html>
