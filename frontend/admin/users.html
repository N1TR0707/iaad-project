<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola User - IAAD Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .user-card {
      background: white;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .user-info {
      flex: 1;
      min-width: 200px;
    }

    .user-info h3 {
      margin: 0 0 0.5rem 0;
      color: var(--primary);
    }

    .user-info p {
      margin: 0.25rem 0;
      color: var(--gray);
      font-size: 0.9rem;
    }

    .user-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 0.5rem;
    }

    .badge-admin {
      background: var(--danger);
      color: white;
    }

    .badge-user {
      background: var(--success);
      color: white;
    }

    @media (max-width: 768px) {
      .user-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .user-actions {
        width: 100%;
      }

      .user-actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <span class="logo">🛡️</span>
      <span class="brand-text">IAAD-PROJECT Admin</span>
    </div>
    <ul class="nav-menu">
      <li><a href="/admin/dashboard.html">Dashboard</a></li>
      <li><a href="/admin/products.html">Produk</a></li>
      <li><a href="/admin/serials.html">Serial Numbers</a></li>
      <li><a href="/admin/generate.html">Generate Serial</a></li>
      <li><a href="/admin/activations.html">Aktivasi</a></li>
      <li><a href="/admin/claims.html">Klaim</a></li>
      <li><a href="/admin/users.html" class="active">Users</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>👥 Kelola User</h1>
      <p>Manajemen akun user dan admin</p>
    </div>

    <div class="card">
      <div class="card-header">📋 Daftar User</div>
      
      <div id="usersList">
        <div class="loading">⏳ Memuat data user...</div>
      </div>
    </div>
  </div>

  <!-- Edit User Modal -->
  <div id="editModal" class="modal hidden" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; overflow-y: auto; padding: 1rem;">
    <div class="card" style="max-width: 500px; width: 90%; margin: 2rem auto;">
      <div class="card-header">✏️ Edit User</div>
      
      <form id="editForm" style="padding: 1rem;">
        <input type="hidden" id="editUserId">
        
        <div class="form-group">
          <label class="form-label">Nama *</label>
          <input type="text" id="editNama" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Email *</label>
          <input type="email" id="editEmail" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Role *</label>
          <select id="editRole" class="form-select" required>
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Telepon</label>
          <input type="text" id="editTelepon" class="form-input" readonly disabled>
          <small style="color: var(--gray);">Telepon tidak dapat diubah</small>
        </div>

        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
          <button type="submit" class="btn btn-primary" style="flex: 1; min-width: 120px;">
            💾 Simpan
          </button>
          <button type="button" onclick="closeEditModal()" class="btn" style="flex: 1; min-width: 120px; background: var(--gray); color: white;">
            ❌ Batal
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    let usersData = [];

    async function loadUsers() {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch('/api/admin/users', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (!response.ok) throw new Error('Gagal memuat user');

        const data = await response.json();
        usersData = data.users;
        displayUsers(usersData);
      } catch (error) {
        console.error('Load users error:', error);
        document.getElementById('usersList').innerHTML = `
          <div class="error-message">❌ ${error.message}</div>
        `;
      }
    }

    function displayUsers(users) {
      const container = document.getElementById('usersList');
      
      if (users.length === 0) {
        container.innerHTML = '<div class="info-message">📭 Belum ada user terdaftar</div>';
        return;
      }

      const currentUserId = getUserIdFromToken();

      container.innerHTML = users.map(user => `
        <div class="user-card">
          <div class="user-info">
            <h3>
              ${escapeHtml(user.nama)}
              <span class="badge ${user.role === 'admin' ? 'badge-admin' : 'badge-user'}">
                ${user.role === 'admin' ? '👑 Admin' : '👤 User'}
              </span>
              ${user.id === currentUserId ? '<span class="badge" style="background: var(--warning);">⭐ You</span>' : ''}
            </h3>
            <p>📧 ${escapeHtml(user.email)}</p>
            <p>📱 ${user.telepon ? escapeHtml(user.telepon) : '-'}</p>
            <p style="font-size: 0.8rem; color: var(--gray);">📅 Terdaftar: ${formatDate(user.created_at)}</p>
          </div>
          <div class="user-actions">
            <button onclick="editUser(${user.id})" class="btn btn-primary" style="min-width: 100px;">
              ✏️ Edit
            </button>
            <button onclick="deleteUser(${user.id}, '${escapeHtml(user.nama)}')" 
                    class="btn btn-danger" 
                    style="min-width: 100px;"
                    ${user.id === currentUserId ? 'disabled title="Tidak dapat menghapus akun sendiri"' : ''}>
              🗑️ Hapus
            </button>
          </div>
        </div>
      `).join('');
    }

    function getUserIdFromToken() {
      const token = localStorage.getItem('token');
      if (!token) return null;
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        return payload.userId;
      } catch {
        return null;
      }
    }

    function editUser(userId) {
      const user = usersData.find(u => u.id === userId);
      if (!user) return;

      document.getElementById('editUserId').value = user.id;
      document.getElementById('editNama').value = user.nama;
      document.getElementById('editEmail').value = user.email;
      document.getElementById('editRole').value = user.role;
      document.getElementById('editTelepon').value = user.telepon || '-';

      document.getElementById('editModal').style.display = 'flex';
      document.getElementById('editModal').classList.remove('hidden');
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
      document.getElementById('editModal').classList.add('hidden');
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const userId = document.getElementById('editUserId').value;
      const nama = document.getElementById('editNama').value;
      const email = document.getElementById('editEmail').value;
      const role = document.getElementById('editRole').value;

      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/api/admin/users/${userId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ nama, email, role })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Gagal update user');
        }

        alert('✅ User berhasil diupdate!');
        closeEditModal();
        loadUsers();
      } catch (error) {
        console.error('Update user error:', error);
        alert('❌ ' + error.message);
      }
    });

    async function deleteUser(userId, userName) {
      if (!confirm(`⚠️ Apakah Anda yakin ingin menghapus user "${userName}"?\n\nSemua data aktivasi dan klaim terkait user ini akan hilang!\n\nTindakan ini tidak dapat dibatalkan!`)) {
        return;
      }

      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/api/admin/users/${userId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Gagal menghapus user');
        }

        alert('✅ User berhasil dihapus!');
        loadUsers();
      } catch (error) {
        console.error('Delete user error:', error);
        alert('❌ ' + error.message);
      }
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('id-ID', { 
        day: 'numeric', 
        month: 'short', 
        year: 'numeric' 
      });
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Load on page ready
    loadUsers();
  </script>
</body>
</html>
