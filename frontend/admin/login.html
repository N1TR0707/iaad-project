<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - IAAD-PROJECT</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2>🔐 Admin Login</h2>
      
      <div id="alert" class="hidden"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" id="username" class="form-input" placeholder="Masukkan username admin" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Masukkan password" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          Login sebagai Admin
        </button>
      </form>
      
      <div class="auth-link" style="margin-top: 1.5rem;">
        <a href="/">← Kembali ke Beranda</a>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading"></div>
  </div>

  <script>
    // Check if already logged in as admin
    if (localStorage.getItem('adminToken')) {
      window.location.href = '/admin/dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const alertDiv = document.getElementById('alert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showAlert('Username dan password wajib diisi', 'error');
        return;
      }

      showLoading(true);

      try {
        const response = await fetch('/api/auth/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Save admin token
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('admin', JSON.stringify(data.admin));
          
          showAlert('Login berhasil! Mengalihkan...', 'success');
          setTimeout(() => {
            window.location.href = '/admin/dashboard.html';
          }, 1000);
        } else {
          showAlert(data.error || 'Login gagal', 'error');
        }
      } catch (error) {
        showAlert('Terjadi kesalahan. Coba lagi nanti.', 'error');
      } finally {
        showLoading(false);
      }
    });

    function showAlert(message, type) {
      alertDiv.className = type === 'success' ? 'alert alert-success' : 'alert alert-error';
      alertDiv.textContent = message;
      alertDiv.classList.remove('hidden');
    }

    function showLoading(show) {
      document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
    }
  </script>
</body>
</html>
