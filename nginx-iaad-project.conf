# IAAD-PROJECT Nginx Configuration
# Save this file to: /etc/nginx/sites-available/iaad-project
# Then symlink to: /etc/nginx/sites-enabled/iaad-project

upstream iaad_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP Server
server {
    listen 80;
    listen [::]:80;
    
    # Ganti dengan domain atau IP Anda
    server_name your-domain.com www.your-domain.com;
    
    # Logging
    access_log /var/log/nginx/iaad-project-access.log;
    error_log /var/log/nginx/iaad-project-error.log;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Max upload size (untuk foto klaim)
    client_max_body_size 50M;
    client_body_buffer_size 50M;
    
    # Root location
    location / {
        proxy_pass http://iaad_backend;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
    }
    
    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://iaad_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Cache static files
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # Uploads directory
    location /uploads/ {
        proxy_pass http://iaad_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Security: prevent execution
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://iaad_backend;
        access_log off;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

